name: Publish NuGet Package

on:
  push:
    paths:
      - 'generated-code/src/PetstoreApi.Contracts/PetstoreApi.Contracts.csproj'
      - 'generated-code/src/PetstoreApi.Contracts/**/*.cs'
      - 'generated-code/Contract/**/*.cs'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build NuGet package
        run: |
          dotnet pack generated-code/src/PetstoreApi.Contracts/PetstoreApi.Contracts.csproj \
            --configuration Release \
            --output ./nupkgs

      - name: Publish NuGet package to GitHub Packages
        run: |
          dotnet nuget push ./nupkgs/*.nupkg \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate
